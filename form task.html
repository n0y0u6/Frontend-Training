<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <h1>Movie Ticket Booking Form</h1>
        <label>Select Movie:</label>
        <select>
        <option>Avengers</option>
        <option>Bahubali</option>
        <option>Peddi</option>
        </select>
        <br>
        <label>Choose Snacks:</label><br>
        <input type="checkbox" value="Popcorn">
        Popcorn
        <br>
        <input type="checkbox" value="Nachos">
        Nachos
        <br>
        <input type="checkbox" value="Soft Drink">
        Soft Drink
        <br>
        <input type="checkbox" value="French Fries">
        French Fries
        <br>
        <label>Show Time:</label><br>
        <input type="radio" value="Morning">
        Morning <br>
        <input type="radio" value="Afternoon">
        Afternoon <br>
        <input type="radio" value="Evening">
        Evening <br>
        <label>Payment Method:</label>
        <select>
            <option>Cash</option>
            <option>Online</option>
        </select>
        <br>
        <button>Book Ticket</button>
    </form>
</body>
</html>

                <option>India</option>
                <option>China</option>
            </select>

            <label>Gender</label>
            <input type="radio" name="Gender" value="Male">

             <input type="radio" name="Gender" value="Female">

             <input type="checkbox" value="Sports">
             Sports
              <input type="checkbox" value="Writing">
              Writing
            <br>
             <label>Date of Birth:</label>
             <input type="date"><br>
             <Button type="submit">Register</Button>
    </form>  
</body>
</html>
